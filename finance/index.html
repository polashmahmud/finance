<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Khaata — Personal Finance, Redesigned</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Plus Jakarta Sans', 'Hind Siliguri', system-ui, sans-serif;
    background: #efece4;
    color: #1b1b1f;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  /* Bengali characters render through Hind Siliguri */
  body {
    font-feature-settings: 'ss01', 'cv11';
  }
  #root { min-height: 100vh; }
  .stage {
    min-height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    padding: 40px 20px 60px;
    background:
      radial-gradient(1200px 600px at 20% -10%, #f7f3e8 0%, transparent 60%),
      radial-gradient(800px 500px at 90% 110%, #ece9df 0%, transparent 60%),
      #f1ede4;
  }
  @media (max-width: 720px) {
    .stage { padding: 0; background: #fafaf7; }
  }
  /* The phone shell scales down for mobile viewports so it's usable on a real phone */
  .phone-wrap { transform-origin: top center; }
  @media (max-width: 480px) {
    .phone-wrap { transform: none; }
    .ios-bezel { display: none; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
